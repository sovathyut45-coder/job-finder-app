name: job_finder_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  get: ^4.7.2
  dio: ^5.9.0
  get_storage: ^2.1.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  file_picker: ^10.3.2
  device_preview: ^1.2.0
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1
  flutter_html: ^3.0.0
  share_plus: ^11.1.0
  flutter_native_splash: ^2.4.0
  skeletonizer: ^1.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

flutter_native_splash:
  color: "#0F172A"
  image: assets/images/logo1.png

  android: true
  ios: true
  web: true

  fullscreen: true

  android_12:
    color: "#0F172A"
    image: assets/images/logo1.png
    icon_background_color: "#0F172A"
    
